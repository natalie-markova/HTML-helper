<!DOCTYPE html>
<!-- Document type - указывает браузеру, с какой версией HTML нужно работать (в данном случае - HTML5) -->

<html lang="en">
<!-- Корневой контейнер, заключает в себя весь код страницы. Атрибут lang определяет основной язык страницы -->

<head>
<!-- Хранит мета-данные страницы, ссылки на скрипты, стили --> 

    <meta charset="UTF-8">
    <!-- Тег устанавливает кодировку символов -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Тег для настройки отображения на мобильных устройствах -->

    <title>Document</title>
    <!-- Заголовок документа - исправляйте на осмысленный заголовок -->

</head>
<!-- Закрывающий тег для head-->

<body>
<!-- Тело документа для размезщения видимой пользователю информации -->

</body>
<!-- Закрывающий тег для body--> 

</html>
<!-- Закрывающий тег для html-->
